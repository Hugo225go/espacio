<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Romantic Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #animation-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #001122 0%, #000000 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        .star.large {
            animation-duration: 3s;
            box-shadow: 0 0 5px white;
        }

        .star.blue {
            background: #aaccff;
            box-shadow: 0 0 3px #aaccff;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        #light-trail {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #ffffff 0%, #ffcccc 50%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px #ffcccc, 0 0 40px #ffcccc, 0 0 60px #ffcccc;
            animation: move-trail 2s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes move-trail {
            0% { left: -50px; top: 50vh; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100vw; top: 50vh; opacity: 0; }
        }

        .photo {
            position: absolute;
            max-width: 200px;
            max-height: 150px;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 204, 204, 0.8), 0 0 80px rgba(255, 204, 204, 0.5);
            opacity: 0;
            transform: scale(0.7) rotateY(15deg);
            filter: brightness(1.1) contrast(1.2) saturate(1.3);
            transition: all 1s ease-in-out;
            animation: pulse 2s infinite alternate;
            cursor: grab;
        }

        .photo:active {
            cursor: grabbing;
        }

        .photo.dragging {
            z-index: 1000;
            box-shadow: 0 0 60px rgba(255, 204, 204, 1), 0 0 120px rgba(255, 204, 204, 0.7);
        }

        .photo.shrink {
            animation: shrink-away 1.2s ease-out forwards;
            transform-origin: center center;
            animation-fill-mode: forwards;
        }

        .photo.explode {
            animation: explode-away 1s ease-out forwards;
            transform-origin: center center;
            animation-fill-mode: forwards;
        }

        .photo.hyperspace {
            animation: hyperspace-out 4s ease-in forwards;
        }

        .photo.streak::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -100px;
            width: 200px;
            height: 2px;
            background: linear-gradient(to right, transparent, #ffcccc, transparent);
            transform: translateY(-50%);
            animation: streak-flash 0.5s infinite;
        }

        .photo-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 204, 204, 0.95);
            pointer-events: none;
            opacity: 0;
            animation: photo-spark 1.2s ease-out forwards;
        }

        @keyframes photo-spark {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
        }

        @keyframes shrink-away {
            0% { transform: scale(1) rotateY(0deg); opacity: 1; }
            50% { transform: scale(0.15) rotateY(180deg); opacity: 0.6; }
            100% { transform: scale(0.02) rotateY(360deg); opacity: 0; }
        }

        @keyframes explode-away {
            0% { transform: scale(0.02) rotate(0deg); opacity: 0; }
            30% { transform: scale(0.15) rotate(90deg); opacity: 0.2; }
            70% { transform: scale(0.6) rotate(180deg); opacity: 0.9; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.03) rotate(720deg); opacity: 0; }
        }

        @keyframes hyperspace-out {
            0% { transform: translate(0, 0) scale(1) rotateY(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.05) rotateY(720deg); opacity: 0; }
        }

        @keyframes streak-flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffcccc;
            border-radius: 50%;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        .comet {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow: 0 0 10px white, 0 0 20px white, -20px 0 20px white;
            animation: comet-move 6s linear infinite;
        }

        @keyframes comet-move {
            0% { left: -50px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 110vw; opacity: 0; }
        }

        .heart {
            position: absolute;
            color: #ffcccc;
            font-size: 24px;
            animation: float-hearts 8s linear infinite;
            text-shadow: 0 0 5px #ffcccc;
        }

        @keyframes float-hearts {
            0% { bottom: -50px; opacity: 0; transform: scale(0.5); }
            10% { opacity: 1; transform: scale(1); }
            90% { opacity: 1; transform: scale(1); }
            100% { bottom: 100vh; opacity: 0; transform: scale(0.5); }
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        #ending-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: perspective(800px) translate(-50%, -50%) rotateX(20deg);
            transform-style: preserve-3d;
            font-size: 60px;
            color: #ffcccc;
            text-align: center;
            opacity: 0;
            white-space: pre-line;
            text-shadow: 0 0 20px #ffcccc;
        }

        .show-text {
            animation: text-3d-float 4s ease-in-out forwards, glow 2s infinite alternate 0.4s;
            font-weight: 900;
            letter-spacing: 1.2px;
        }

        @keyframes text-3d-float {
            0% { opacity: 0; transform: perspective(800px) translate(-50%, -50%) rotateX(25deg) translateZ(-40px); }
            50% { opacity: 1; transform: perspective(800px) translate(-50%, -50%) rotateX(20deg) translateZ(24px); }
            100% { opacity: 1; transform: perspective(800px) translate(-50%, -50%) rotateX(18deg) translateZ(16px); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 20px #ffcccc; }
            100% { text-shadow: 0 0 40px #ffcccc, 0 0 60px #ffcccc; }
        }

        @keyframes fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Positioning photos */
        #photo1 { top: 20%; left: 10%; animation: reveal 1s ease-in-out 2s forwards; }
        #photo2 { top: 30%; left: 20%; animation: reveal 1s ease-in-out 3.5s forwards; }
        #photo3 { top: 40%; left: 30%; animation: reveal 1s ease-in-out 5s forwards; }
        #photo4 { top: 50%; left: 40%; animation: reveal 1s ease-in-out 6.5s forwards; }
        #photo5 { top: 60%; left: 50%; animation: reveal 1s ease-in-out 8s forwards; }
        #photo6 { top: 70%; left: 60%; animation: reveal 1s ease-in-out 9.5s forwards; }
        #photo7 { top: 20%; left: 70%; animation: reveal 1s ease-in-out 11s forwards; }
        #photo8 { top: 30%; left: 80%; animation: reveal 1s ease-in-out 12.5s forwards; }
        #photo9 { top: 40%; left: 10%; animation: reveal 1s ease-in-out 14s forwards; }
        #photo10 { top: 50%; left: 20%; animation: reveal 1s ease-in-out 15.5s forwards; }
        #photo11 { top: 60%; left: 30%; animation: reveal 1s ease-in-out 17s forwards; }
        #photo12 { top: 70%; left: 40%; animation: reveal 1s ease-in-out 18.5s forwards; }
        #photo13 { top: 20%; left: 50%; animation: reveal 1s ease-in-out 20s forwards; }
        #photo14 { top: 30%; left: 60%; animation: reveal 1s ease-in-out 21.5s forwards; }
        #photo15 { top: 40%; left: 70%; animation: reveal 1s ease-in-out 23s forwards; }
        #photo16 { top: 50%; left: 80%; animation: reveal 1s ease-in-out 24.5s forwards; }
        #photo17 { top: 60%; left: 10%; animation: reveal 1s ease-in-out 26s forwards; }
        #photo18 { top: 70%; left: 20%; animation: reveal 1s ease-in-out 27.5s forwards; }
        #photo19 { top: 20%; left: 30%; animation: reveal 1s ease-in-out 29s forwards; }
        #photo20 { top: 30%; left: 40%; animation: reveal 1s ease-in-out 30.5s forwards; }

        @keyframes reveal {
            0% { opacity: 0; transform: scale(0.7) rotateY(15deg); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1.3) rotateY(0deg); filter: blur(0px); }
        }
    </style>
</head>
<body>
    <div id="animation-container">
        <!-- Stars -->
        <div class="star" style="width: 2px; height: 2px; top: 10%; left: 10%;"></div>
        <div class="star large" style="width: 4px; height: 4px; top: 20%; left: 20%;"></div>
        <div class="star blue" style="width: 1px; height: 1px; top: 30%; left: 30%;"></div>
        <div class="star" style="width: 3px; height: 3px; top: 40%; left: 40%;"></div>
        <div class="star large blue" style="width: 5px; height: 5px; top: 50%; left: 50%;"></div>
        <!-- Add more stars -->

        <!-- Comets -->
        <div class="comet" style="top: 15%; animation-delay: 0s;"></div>
        <div class="comet" style="top: 35%; animation-delay: 2s;"></div>
        <div class="comet" style="top: 55%; animation-delay: 4s;"></div>
        <div class="comet" style="top: 75%; animation-delay: 6s;"></div>

        <!-- Hearts -->
        <div class="heart" style="left: 10%; animation-delay: 1s;">♥</div>
        <div class="heart" style="left: 30%; animation-delay: 3s;">♥</div>
        <div class="heart" style="left: 50%; animation-delay: 5s;">♥</div>
        <div class="heart" style="left: 70%; animation-delay: 7s;">♥</div>
        <div class="heart" style="left: 90%; animation-delay: 9s;">♥</div>

        <!-- Light trail -->
        <div id="light-trail"></div>

        <!-- Photos -->
        <img id="photo1" class="photo" src="1.jpg" alt="Photo 1">
        <img id="photo2" class="photo" src="2.jpg" alt="Photo 2">
        <img id="photo3" class="photo" src="3.jpg" alt="Photo 3">
        <img id="photo4" class="photo" src="4.jpg" alt="Photo 4">
        <img id="photo5" class="photo" src="5.jpg" alt="Photo 5">
        <img id="photo6" class="photo" src="6.jpg" alt="Photo 6">
        <img id="photo7" class="photo" src="7.jpg" alt="Photo 7">
        <img id="photo8" class="photo" src="8.jpg" alt="Photo 8">
        <img id="photo9" class="photo" src="9.jpg" alt="Photo 9">
        <img id="photo10" class="photo" src="10.jpg" alt="Photo 10">
        <img id="photo11" class="photo" src="11.jpg" alt="Photo 11">
        <img id="photo12" class="photo" src="12.jpg" alt="Photo 12">
        <img id="photo13" class="photo" src="13.jpg" alt="Photo 13">
        <img id="photo14" class="photo" src="14.jpg" alt="Photo 14">
        <img id="photo15" class="photo" src="15.jpg" alt="Photo 15">
        <img id="photo16" class="photo" src="16.jpg" alt="Photo 16">
        <img id="photo17" class="photo" src="17.jpg" alt="Photo 17">
        <img id="photo18" class="photo" src="18.jpg" alt="Photo 18">
        <img id="photo19" class="photo" src="19.jpg" alt="Photo 19">
        <img id="photo20" class="photo" src="20.jpg" alt="Photo 20">

        <!-- Particles container -->
        <div class="particles" id="particles"></div>

        <!-- Vignette -->
        <div class="vignette"></div>

        <!-- Ending text -->
        <div id="ending-text">feliz 6 meses<br>te amo</div>
    </div>

    <script>
        // Add more particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 100; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 2 + 's';
            particlesContainer.appendChild(particle);
        }

        // Faster camera movement
        const container = document.getElementById('animation-container');
        let angle = 0;
        function cameraMove() {
            angle += 0.03;
            container.style.transform = `perspective(1000px) rotateY(${Math.sin(angle) * 3}deg) rotateX(${Math.cos(angle) * 2}deg)`;
            requestAnimationFrame(cameraMove);
        }
        cameraMove();

        // Dragging functionality
        let draggedElement = null;
        let offsetX, offsetY;

        document.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('photo')) {
                draggedElement = e.target;
                draggedElement.classList.add('dragging');
                offsetX = e.clientX - draggedElement.offsetLeft;
                offsetY = e.clientY - draggedElement.offsetTop;
                e.preventDefault();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (draggedElement) {
                draggedElement.style.left = (e.clientX - offsetX) + 'px';
                draggedElement.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
                draggedElement = null;
            }
        });

        // Start shrinking photos right before the final explosion
        setTimeout(() => {
            const photos = document.querySelectorAll('.photo');
            photos.forEach(photo => {
                photo.classList.add('shrink');
                photo.style.animation = 'shrink-away 1.2s ease-out forwards';
                photo.style.opacity = '1';
                photo.style.transition = 'none';
            });
        }, 33000);

        // Explode photos and reveal final message
        setTimeout(() => {
            const photos = document.querySelectorAll('.photo');
            photos.forEach(photo => {
                const rect = photo.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const x = (Math.random() - 0.5) * window.innerWidth * 1.4;
                const y = (Math.random() - 0.5) * window.innerHeight * 1.4;
                photo.style.setProperty('--tx', x + 'px');
                photo.style.setProperty('--ty', y + 'px');
                photo.classList.add('explode');

                // Create many small particles from each photo
                for (let i = 0; i < 18; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'photo-particle';
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    const dx = (Math.random() - 0.5) * window.innerWidth * 0.7;
                    const dy = (Math.random() - 0.5) * window.innerHeight * 0.7;
                    particle.style.setProperty('--dx', dx + 'px');
                    particle.style.setProperty('--dy', dy + 'px');
                    particle.style.width = 4 + Math.random() * 8 + 'px';
                    particle.style.height = 4 + Math.random() * 8 + 'px';
                    container.appendChild(particle);
                    setTimeout(() => particle.remove(), 1300);
                }
                setTimeout(() => {
                    photo.style.opacity = '0';
                }, 950);
            });
            const text = document.getElementById('ending-text');
            text.classList.add('show-text');
        }, 34800);
    </script>
</body>
</html>
